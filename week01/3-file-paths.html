<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Path Activity</title>
</head>

<body>
    <h1>File Path Activity</h1>
    <p>Fix the image tags below so that they each display the correct image.</p>

    <p>A temple image file in the images subfolder:</p>
    <img src="images/aba-nigeria-temple.jpeg" alt="The Aba Nigeria Temple">

    <p>A temple image file in the root images folder:</p>
    <img src="../images/salt-lake-temple.jpg" alt="The Salt Lake Temple">


    <p>A temple image file with a divided absolute path:</p>
    <img id="anchorage-temple" alt="The Anchorage Alaska Temple">

    <script>
        // Divide the long URL into clean, readable pieces
        const urlParts = [
            "https://content.churchofjesuschrist.org/",
            "templesldsorg/bc/Temples/photo-galleries/",
            "anchorage-alaska/320x180/",
            "anchorage-temple-lds-253274-wallpaper.jpg"
        ];

        // Join the pieces together with no spaces and inject it into the image
        document.getElementById("anchorage-temple").src = urlParts.join('');
    </script>

</body>

</html>
